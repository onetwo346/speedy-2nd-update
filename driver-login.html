<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Driver Login – Speedy Delivery</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <script src="speedy-sync.js"></script>
  <script src="auth.js"></script>
  <script>
    (function() {
      const s = typeof speedyGetSession === 'function' ? speedyGetSession() : null;
      if (s && s.role === 'driver') window.location.replace('driver.html');
    })();
  </script>
</head>
<body>

<div class="sd-auth-page">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-6 col-lg-5">

        <div class="text-center mb-4">
          <a href="index.html" class="sd-brand justify-content-center" style="color:var(--navy);">
            <span class="sd-brand-icon">🚀</span>
            <span>Speedy<strong>Delivery</strong></span>
          </a>
        </div>

        <div class="sd-auth-card">
          <div class="sd-auth-logo">🚗</div>
          <h1 class="sd-auth-title">Driver Portal</h1>
          <p class="sd-auth-sub">Sign in to manage your deliveries across Agona Swedru &amp; Central Region.</p>

          <div id="login-alert"></div>

          <form id="login-form" novalidate>
            <div class="mb-3">
              <label class="sd-label" for="username">Email / Phone</label>
              <input type="text" id="username" class="sd-input" placeholder="Enter your email or phone" autocomplete="username" required>
            </div>
            <div class="mb-4">
              <label class="sd-label" for="password">Password</label>
              <div class="position-relative">
                <input type="password" id="password" class="sd-input" placeholder="Your password" autocomplete="current-password" required>
                <button type="button" class="sd-eye-toggle" onclick="togglePwd('password',this)" aria-label="Show password">
                  <i class="fas fa-eye"></i>
                </button>
              </div>
            </div>
            <button type="submit" class="sd-btn sd-btn-primary w-100" id="login-btn">
              <i class="fas fa-sign-in-alt me-2"></i>Sign In
            </button>
          </form>

          <div class="text-center mt-4">
            <a href="#" id="forgot-link" class="text-muted small">Forgot password?</a>
            <span class="text-muted small mx-2">•</span>
            <a href="driver-signup.html" class="text-muted small">Create account</a>
          </div>
        </div>

        <p class="text-center text-muted small mt-4">
          <a href="index.html" class="text-muted">← Back to main site</a>
        </p>
      </div>
    </div>
  </div>
</div>

<!-- Forgot Password Modal -->
<div class="modal fade" id="resetModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content rounded-3 border-0 shadow-lg">
      <div class="modal-header border-0 pb-0">
        <h5 class="modal-title fw-bold"><i class="fas fa-key me-2 text-brand"></i>Reset Password</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body px-4 pb-4">
        <p class="text-muted small mb-3">Enter your registered email and phone number to reset your password.</p>
        <div id="reset-alert"></div>
        <div class="mb-3">
          <label class="sd-label" for="reset-email">Email</label>
          <input type="email" id="reset-email" class="sd-input" placeholder="Your registered email">
        </div>
        <div class="mb-3">
          <label class="sd-label" for="reset-phone">Phone Number</label>
          <input type="tel" id="reset-phone" class="sd-input" placeholder="Your registered phone">
        </div>
        <div class="mb-3">
          <label class="sd-label" for="reset-pw1">New Password</label>
          <input type="password" id="reset-pw1" class="sd-input" placeholder="Min. 6 characters" autocomplete="new-password">
        </div>
        <div class="mb-4">
          <label class="sd-label" for="reset-pw2">Confirm New Password</label>
          <input type="password" id="reset-pw2" class="sd-input" placeholder="Repeat password" autocomplete="new-password">
        </div>
        <button class="sd-btn sd-btn-primary w-100" id="reset-save-btn">Reset Password</button>
      </div>
    </div>
  </div>
</div>

<style>
  .text-brand { color: var(--brand) !important; }
  .sd-eye-toggle {
    position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
    background: none; border: none; color: var(--text-muted); cursor: pointer; padding: 0;
  }
  .sd-eye-toggle:hover { color: var(--text); }
</style>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
  function togglePwd(id, btn) {
    const inp = document.getElementById(id);
    if (!inp) return;
    const show = inp.type === 'password';
    inp.type = show ? 'text' : 'password';
    btn.querySelector('i').className = show ? 'fas fa-eye-slash' : 'fas fa-eye';
  }

  function showAlert(msg, type, targetId) {
    document.getElementById(targetId).innerHTML =
      `<div class="sd-alert sd-alert-${type}">${msg}</div>`;
  }

  document.getElementById('login-form').addEventListener('submit', async e => {
    e.preventDefault();
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    const btn = document.getElementById('login-btn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Signing in…';
    const res = await speedyLogin({ role: 'driver', username, password });
    btn.disabled = false;
    btn.innerHTML = '<i class="fas fa-sign-in-alt me-2"></i>Sign In';
    if (!res.ok) { showAlert(res.message || 'Login failed. Check your credentials.', 'danger', 'login-alert'); return; }
    window.location.replace('driver.html');
  });

  const resetModal = new bootstrap.Modal(document.getElementById('resetModal'));
  document.getElementById('forgot-link').addEventListener('click', e => {
    e.preventDefault();
    document.getElementById('reset-alert').innerHTML = '';
    ['reset-email','reset-phone','reset-pw1','reset-pw2'].forEach(id => document.getElementById(id).value = '');
    resetModal.show();
  });

  document.getElementById('reset-save-btn').addEventListener('click', async () => {
    const email = document.getElementById('reset-email').value.trim();
    const phone = document.getElementById('reset-phone').value.trim();
    const p1 = document.getElementById('reset-pw1').value;
    const p2 = document.getElementById('reset-pw2').value;
    if (!email || !phone || !p1 || !p2) { showAlert('Please fill in all fields.', 'warning', 'reset-alert'); return; }
    if (p1.length < 6) { showAlert('Password must be at least 6 characters.', 'warning', 'reset-alert'); return; }
    if (p1 !== p2) { showAlert('Passwords do not match.', 'warning', 'reset-alert'); return; }
    const btn = document.getElementById('reset-save-btn');
    btn.disabled = true;
    const res = await speedyDriverResetPassword({ email, phone, newPassword: p1 });
    btn.disabled = false;
    if (!res?.ok) { showAlert(res?.message || 'Reset failed. Check your email and phone.', 'danger', 'reset-alert'); return; }
    showAlert('Password reset! You can now sign in.', 'success', 'reset-alert');
    setTimeout(() => resetModal.hide(), 1200);
  });
</script>
</body>
</html>
